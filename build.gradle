plugins {
    id 'java'
    id 'io.qameta.allure' version '4.0.0'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation (
            'org.junit.jupiter:junit-jupiter:5.11.1',
            'com.codeborne:selenide:7.12.1',
    )
}

allure {
    report {//секция репорта
        version.set("2.39.0") //версия Allure Report
    }
}


tasks.withType(Test) {
    useJUnitPlatform()

    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}